version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      time: "20:00"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      eslint:
        patterns:
          - "@eslint/js"
          - "eslint"
    ignore:
      - dependency-name: "@heroicons/react"
      - dependency-name: "chalk"
